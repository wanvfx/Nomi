<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Nomi 安装流程示意图</title>
  <desc id="desc">下载、安装、首次打开和创建项目的四步流程。</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="1" stop-color="#f1efe8"/>
    </linearGradient>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#5147b6" opacity=".12"/>
    </pattern>
  </defs>
  <rect width="1200" height="620" rx="28" fill="#f7f3ea"/>
  <rect width="1200" height="620" rx="28" fill="url(#dots)"/>
  <text x="54" y="70" font-family="Noto Serif SC, Songti SC, serif" font-size="38" font-weight="900" fill="#1a1816">安装到第一屏，只需要四步</text>
  <text x="54" y="108" font-family="Inter, PingFang SC, sans-serif" font-size="17" fill="#6a6258">不用命令行。装好后项目和素材都保存在你的本地电脑。</text>
  <g transform="translate(54 166)">
    <g>
      <rect width="250" height="314" rx="18" fill="url(#panel)" stroke="#d9d3c5"/>
      <circle cx="34" cy="34" r="18" fill="#5147b6"/>
      <text x="28" y="41" font-family="Inter, sans-serif" font-size="20" font-weight="800" fill="#fffdf8">1</text>
      <text x="28" y="90" font-family="Inter, PingFang SC, sans-serif" font-size="22" font-weight="800" fill="#1a1816">选安装包</text>
      <text x="28" y="126" font-family="Inter, PingFang SC, sans-serif" font-size="15" fill="#6a6258">M1/M2/M3/M4 选 arm64</text>
      <text x="28" y="152" font-family="Inter, PingFang SC, sans-serif" font-size="15" fill="#6a6258">旧 Intel Mac 选 intel</text>
      <text x="28" y="178" font-family="Inter, PingFang SC, sans-serif" font-size="15" fill="#6a6258">Windows 选 setup.exe</text>
      <rect x="28" y="218" width="194" height="52" rx="10" fill="#1a1816"/>
      <text x="58" y="251" font-family="Inter, PingFang SC, sans-serif" font-size="16" font-weight="700" fill="#fffdf8">下载最新版</text>
    </g>
    <g transform="translate(282 0)">
      <rect width="250" height="314" rx="18" fill="url(#panel)" stroke="#d9d3c5"/>
      <circle cx="34" cy="34" r="18" fill="#5147b6"/>
      <text x="28" y="41" font-family="Inter, sans-serif" font-size="20" font-weight="800" fill="#fffdf8">2</text>
      <text x="28" y="90" font-family="Inter, PingFang SC, sans-serif" font-size="22" font-weight="800" fill="#1a1816">拖进应用</text>
      <rect x="34" y="126" width="74" height="86" rx="16" fill="#e8765a" opacity=".92"/>
      <path d="M72 140v56M50 170h44" stroke="#fffdf8" stroke-width="8" stroke-linecap="round"/>
      <path d="M124 170h58" stroke="#6a6258" stroke-width="4" stroke-linecap="round"/>
      <path d="M170 154l22 16-22 16" fill="none" stroke="#6a6258" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="190" y="126" width="38" height="86" rx="10" fill="#1a1816"/>
      <text x="28" y="256" font-family="Inter, PingFang SC, sans-serif" font-size="15" fill="#6a6258">Windows 按安装向导点下一步</text>
    </g>
    <g transform="translate(564 0)">
      <rect width="250" height="314" rx="18" fill="url(#panel)" stroke="#d9d3c5"/>
      <circle cx="34" cy="34" r="18" fill="#5147b6"/>
      <text x="28" y="41" font-family="Inter, sans-serif" font-size="20" font-weight="800" fill="#fffdf8">3</text>
      <text x="28" y="90" font-family="Inter, PingFang SC, sans-serif" font-size="22" font-weight="800" fill="#1a1816">首次打开</text>
      <rect x="28" y="126" width="194" height="96" rx="14" fill="#1a1816"/>
      <text x="50" y="158" font-family="Inter, PingFang SC, sans-serif" font-size="15" fill="#fffdf8">macOS 提示拦截？</text>
      <text x="50" y="186" font-family="Inter, PingFang SC, sans-serif" font-size="15" fill="#fffdf8" opacity=".72">右键 Nomi → 打开</text>
      <text x="28" y="256" font-family="Inter, PingFang SC, sans-serif" font-size="15" fill="#6a6258">只需确认一次，之后正常双击</text>
    </g>
    <g transform="translate(846 0)">
      <rect width="250" height="314" rx="18" fill="url(#panel)" stroke="#d9d3c5"/>
      <circle cx="34" cy="34" r="18" fill="#5147b6"/>
      <text x="28" y="41" font-family="Inter, sans-serif" font-size="20" font-weight="800" fill="#fffdf8">4</text>
      <text x="28" y="90" font-family="Inter, PingFang SC, sans-serif" font-size="22" font-weight="800" fill="#1a1816">新建项目</text>
      <rect x="28" y="128" width="194" height="120" rx="14" fill="#fffdf8" stroke="#d9d3c5"/>
      <path d="M58 162h128M58 192h92" stroke="#6a6258" stroke-width="8" stroke-linecap="round" opacity=".6"/>
      <rect x="58" y="214" width="104" height="20" rx="10" fill="#5147b6"/>
      <text x="28" y="282" font-family="Inter, PingFang SC, sans-serif" font-size="15" fill="#6a6258">下一步：接文本模型或免费网关</text>
    </g>
  </g>
</svg>
