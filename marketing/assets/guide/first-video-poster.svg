    <rect x="96" y="54" width="50" height="34" rx="8" fill="#e8765a"/>
    <rect x="156" y="54" width="50" height="34" rx="8" fill="#fffdf8"/>
    <circle cx="43" cy="132" r="8" fill="#e8765a"/>
    <text x="34" y="36" font-family="Inter, PingFang SC, sans-serif" font-size="16" font-weight="700" fill="#fffdf8">导出 MP4</text>
    <text x="34" y="154" font-family="Inter, PingFang SC, sans-serif" font-size="13" fill="#fffdf8" opacity=".66">Preview = Final</text>
