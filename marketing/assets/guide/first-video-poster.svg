  <rect x="86" y="610" width="1094" height="1" fill="#d9d3c5"/>
  <text x="86" y="650" font-family="Inter, PingFang SC, sans-serif" font-size="18" font-weight="700" fill="#1a1816">Nomi v0.16.2</text>
