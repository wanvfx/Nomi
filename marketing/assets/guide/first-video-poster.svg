      <path d="M98 93h24" stroke="#5147b6" stroke-width="4" stroke-linecap="round"/>
      <circle cx="61" cy="93" r="15" fill="#5147b6" opacity=".88"/>
      <path d="M148 83l22 10-22 10z" fill="#e8765a"/>
      <path d="M40 142h138" stroke="#8a8278" stroke-width="8" stroke-linecap="round" opacity=".45"/>
