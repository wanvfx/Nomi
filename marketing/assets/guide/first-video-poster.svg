    <path d="M638 108h70" stroke="#8a8278" stroke-width="3" stroke-linecap="round"/>
    <path d="M698 95l16 13-16 13" fill="none" stroke="#8a8278" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(738 30)">
