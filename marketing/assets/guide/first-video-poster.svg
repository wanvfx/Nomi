<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Nomi 新手第一条成片海报</title>
  <desc id="desc">从写故事、搭参考、生成节点到时间轴导出的工作流海报。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7f3ea"/>
      <stop offset="0.58" stop-color="#eee8dd"/>
      <stop offset="1" stop-color="#e8e0d3"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#5147b6"/>
      <stop offset="1" stop-color="#e8765a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#1a1816" flood-opacity=".14"/>
    </filter>
    <pattern id="grain" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r=".65" fill="#1a1816" opacity=".045"/>
      <circle cx="5" cy="4" r=".55" fill="#1a1816" opacity=".032"/>
    </pattern>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#grain)"/>
  <g transform="translate(74 70)">
    <text x="0" y="0" font-family="Inter, PingFang SC, sans-serif" font-size="18" font-weight="700" fill="#5147b6" letter-spacing="2">NOMI QUICKSTART</text>
    <text x="0" y="72" font-family="Noto Serif SC, Songti SC, serif" font-size="58" font-weight="900" fill="#1a1816">第一条 AI 视频</text>
    <text x="0" y="128" font-family="Noto Serif SC, Songti SC, serif" font-size="58" font-weight="900" fill="#1a1816">先搭参考，再生成</text>
    <text x="0" y="176" font-family="Inter, PingFang SC, sans-serif" font-size="20" fill="#5f5850">用 3D 导演台把人物、道具、机位、运镜摆出来，让视频模型少猜一点。</text>
  </g>
  <g transform="translate(86 320)" filter="url(#softShadow)">
