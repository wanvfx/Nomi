      <text x="20" y="38" font-family="Inter, PingFang SC, sans-serif" font-size="17" font-weight="700" fill="#1a1816">2 搭参考</text>
      <rect x="28" y="62" width="92" height="62" rx="10" fill="#d8e1ec" stroke="#1a1816" stroke-opacity=".2"/>
      <circle cx="74" cy="88" r="14" fill="#5147b6"/>
