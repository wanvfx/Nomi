name: Download Stats Snapshot

# 每日抓一次 GitHub Releases 的累计下载数，append 到 docs/stats/downloads-history.json。
# 为什么需要它：GitHub 的 download_count 是累计快照、没有时间序列 —— 不每天存一份做差，
# 就永远只有「总量」看不到「每天新增多少」的增长曲线。零隐私足迹（数据来自 Releases，不碰用户端）。

on:
  schedule:
    - cron: '17 0 * * *' # 每天 00:17 UTC（错峰整点，降低被 GitHub 限流概率）
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: download-stats
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Record today's download snapshot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node ./scripts/stats-downloads.mjs --snapshot

      - name: Commit if changed
        run: |
          if git diff --quiet -- docs/stats/downloads-history.json; then
            echo "今日快照无变化，跳过提交。"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/stats/downloads-history.json
          git commit -m "chore(stats): 下载量每日快照 $(date -u +%Y-%m-%d)"
          git push
